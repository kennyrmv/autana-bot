# Autana — configuración del bot de la agencia
#
# Este bot responde las consultas de clientes potenciales que
# contactan el WhatsApp de Autana. Es el caso de estudio #1.

client_slug: "autana"
business_name: "Autana"
sector: "agencia-digital"

# 360dialog channel ID — rellenar cuando tengas la cuenta activa
# Ejemplo: 1234567890
channel_id: "PENDING_360DIALOG_CHANNEL_ID"

# API key de 360dialog para este canal (secreto en Railway env vars)
# Variable de entorno: DIALOG360_API_KEY_AUTANA
dialog360_api_key: "${DIALOG360_API_KEY_AUTANA}"

# Cal.com — Kenny usa Cal para las llamadas de descubrimiento de 15 min
# Variable de entorno: CAL_API_KEY_AUTANA
cal_link: "https://cal.com/kennymedina/15min"
cal_event_type_id: "5299248"

# Stripe — link de pago para cuando el cliente quiere contratar
# Dejar vacío ("") si no está disponible todavía
stripe_link: ""          # URL del payment link de Stripe — rellenar cuando esté activo
                         # Variable de entorno opcional: STRIPE_LINK_AUTANA

# Handoff — a quién alertar cuando el bot necesita escalar
handoff_phone: "+34600000000"   # número real de Kenny
handoff_email: "hola@autana.es"
handoff_triggers:
  - "hablar con alguien"
  - "hablar con una persona"
  - "quiero un presupuesto"
  - "tengo urgencia"

# LOPD
first_message_lopd: true
privacy_url: "https://autana.es/privacidad"

# Plan contratado
# Opciones: esencial (300 conv/mes) | conversion (800 conv/mes) | custom (null = sin límite)
plan: "esencial"
monthly_conversation_limit: 300

# Feature flags — activa solo lo que este cliente tiene contratado
# Cambiar a true cuando el evento de Cal esté configurado
features:
  # Cal.com — gestión de citas
  cal_read_slots: true         # consultar disponibilidad
  cal_create_booking: true     # crear cita desde WhatsApp
  cal_detect_booking: true     # detectar si el usuario ya tiene cita
  cal_cancel_booking: true     # cancelar cita desde WhatsApp

  # Stripe — pagos
  stripe_send_link: false      # bot envía link de pago cuando el usuario quiere contratar (fase 1)
  stripe_payment: false        # pago requerido antes de confirmar cita (fase 2 — requiere webhook Stripe)

# Configuración del bot
personality: "profesional, cercano, directo. Español de España. Sin jerga técnica excesiva."
max_history_turns: 10
